name: Nightly Build & Deploy

on:
  schedule:
    - cron: '0 2 * * *'  # runs every night at 2am UTC
  workflow_dispatch:       # allows manual trigger

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  QA_EC2_HOST: ${{ secrets.QA_EC2_HOST }}
  QA_EC2_USER: ${{ secrets.QA_EC2_USER }}

jobs:
  # ─── JOB 1: Spin up a temporary EC2, build, smoke test ───────────────────
  build-and-test:
    name: Build, Smoke Test on Temp EC2
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/todolist-spa
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Set image tag
        id: set_tag
        run: echo "image_tag=$(date +%Y%m%d)-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT


      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend Docker image
        run: |
          docker build -t todolist-backend ./backend
          docker tag todolist-backend:latest ${{ secrets.ECR_REPOSITORY }}:backend-${{ steps.set_tag.outputs.image_tag }}

      - name: Build frontend Docker image
        run: |
          docker build -t todolist-frontend ./frontend
          docker tag todolist-frontend:latest ${{ secrets.ECR_REPOSITORY }}:frontend-${{ steps.set_tag.outputs.image_tag }}

      - name: Run smoke tests
        run: |
          # Start backend with dummy DB env vars
          docker run -d --name test-backend \
            -e PORT=3333 \
            -e MYSQL_HOST=localhost \
            -e MYSQL_USER=test \
            -e MYSQL_PASSWORD=test \
            -e MYSQL_DB=test \
            -p 3333:3333 \
            todolist-backend:latest

          # Wait for backend to start
          echo "Waiting for backend..."
          sleep 8

          # Smoke test - just verify the process is running
          if docker ps | grep -q test-backend; then
            echo "✅ Smoke test passed! Container is running."
          else
            echo "❌ Smoke test failed! Container crashed."
            docker logs test-backend
            exit 1
          fi

          docker stop test-backend
          docker rm test-backend

      - name: Push images to ECR
        run: |
          docker push ${{ secrets.ECR_REPOSITORY }}:backend-${{ steps.set_tag.outputs.image_tag }}
          docker push ${{ secrets.ECR_REPOSITORY }}:frontend-${{ steps.set_tag.outputs.image_tag }}
          echo "✅ Images pushed to ECR"

  # ─── JOB 2: Deploy to QA EC2 ─────────────────────────────────────────────
  deploy-to-qa:
    name: Deploy to QA EC2
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to QA EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.QA_EC2_HOST }}
          username: ${{ secrets.QA_EC2_USER }}
          key: ${{ secrets.QA_EC2_SSH_KEY }}
          script: |
            # Login to ECR
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY }}

            # Pull latest images
            docker pull ${{ secrets.ECR_REPOSITORY }}:backend-${{ needs.build-and-test.outputs.image_tag }}
            docker pull ${{ secrets.ECR_REPOSITORY }}:frontend-${{ needs.build-and-test.outputs.image_tag }}

            # Stop existing containers
            docker stop todolist-backend todolist-frontend 2>/dev/null || true
            docker rm todolist-backend todolist-frontend 2>/dev/null || true

            # Run backend
            docker run -d --name todolist-backend \
              --restart always \
              -e PORT=3333 \
              -e MYSQL_HOST=${{ secrets.DB_HOST }} \
              -e MYSQL_USER=${{ secrets.DB_USER }} \
              -e MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e MYSQL_DB=${{ secrets.DB_NAME }} \
              -p 3333:3333 \
              ${{ secrets.ECR_REPOSITORY }}:backend-${{ needs.build-and-test.outputs.image_tag }}

            # Run frontend
            docker run -d --name todolist-frontend \
              --restart always \
              -p 80:80 \
              ${{ secrets.ECR_REPOSITORY }}:frontend-${{ needs.build-and-test.outputs.image_tag }}

            echo "✅ Deployment complete!"