name: RC Promotion Deploy

on:
  repository_dispatch:
    types: [rc-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'RC version tag (e.g. v1.0.0-rc1)'
        required: true

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  deploy-rc:
    name: Build and Deploy RC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/todolist-spa
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: rc

      - name: Set RC image tag
        id: set_tag
        run: |
          VERSION="${{ github.event.inputs.version || github.event.client_payload.version }}"
          echo "image_tag=${VERSION}" >> $GITHUB_OUTPUT
          echo "Deploying RC version: ${VERSION}"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build backend Docker image
        run: |
          docker build -t todolist-backend ./backend
          docker tag todolist-backend:latest ${{ secrets.ECR_REPOSITORY }}:backend-${{ steps.set_tag.outputs.image_tag }}

      - name: Build frontend Docker image
        run: |
          docker build -t todolist-frontend ./frontend
          docker tag todolist-frontend:latest ${{ secrets.ECR_REPOSITORY }}:frontend-${{ steps.set_tag.outputs.image_tag }}

      - name: Run smoke tests
        run: |
          docker run -d --name test-backend \
            -e PORT=3333 \
            -e MYSQL_HOST=localhost \
            -e MYSQL_USER=test \
            -e MYSQL_PASSWORD=test \
            -e MYSQL_DB=test \
            -p 3333:3333 \
            todolist-backend:latest

          echo "Waiting for backend..."
          sleep 8

          if docker ps | grep -q test-backend; then
            echo "✅ Smoke test passed!"
          else
            echo "❌ Smoke test failed!"
            docker logs test-backend
            exit 1
          fi

          docker stop test-backend
          docker rm test-backend

      - name: Push RC images to ECR
        run: |
          docker push ${{ secrets.ECR_REPOSITORY }}:backend-${{ steps.set_tag.outputs.image_tag }}
          docker push ${{ secrets.ECR_REPOSITORY }}:frontend-${{ steps.set_tag.outputs.image_tag }}
          echo "✅ RC images pushed to ECR"

      - name: Deploy to RC EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.RC_EC2_HOST }}
          username: ${{ secrets.RC_EC2_USER }}
          key: ${{ secrets.RC_EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ secrets.ECR_REPOSITORY }}

            docker pull ${{ secrets.ECR_REPOSITORY }}:backend-${{ steps.set_tag.outputs.image_tag }}
            docker pull ${{ secrets.ECR_REPOSITORY }}:frontend-${{ steps.set_tag.outputs.image_tag }}

            docker stop todolist-backend todolist-frontend 2>/dev/null || true
            docker rm todolist-backend todolist-frontend 2>/dev/null || true

            docker run -d --name todolist-backend \
              --restart always \
              -e PORT=3333 \
              -e MYSQL_HOST=${{ secrets.DB_HOST }} \
              -e MYSQL_USER=${{ secrets.DB_USER }} \
              -e MYSQL_PASSWORD=${{ secrets.DB_PASSWORD }} \
              -e MYSQL_DB=${{ secrets.DB_NAME }} \
              -p 3333:3333 \
              ${{ secrets.ECR_REPOSITORY }}:backend-${{ steps.set_tag.outputs.image_tag }}

            docker run -d --name todolist-frontend \
              --restart always \
              -p 8080:80 \
              ${{ secrets.ECR_REPOSITORY }}:frontend-${{ steps.set_tag.outputs.image_tag }}

            echo "✅ RC Deployment complete! Version: ${{ steps.set_tag.outputs.image_tag }}"